<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>trade.cosigo.io admin</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: #0b0f14;
            color: #eef3f9;
        }

        .wrap {
            width: min(1100px, calc(100% - 24px));
            margin: 24px auto 60px;
        }

        .card,
        .item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 16px;
        }

        input,
        select,
        button {
            min-height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.03);
            color: #eef3f9;
            padding: 0 12px;
            font: inherit;
        }

        button {
            cursor: pointer;
            font-weight: 700;
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 8px 12px;
            margin-top: 10px;
        }

        .label {
            color: #9cabbd;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: .08em;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            word-break: break-word;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .form-grid label {
            display: grid;
            gap: 6px;
        }

        .form-grid span {
            color: #9cabbd;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: .08em;
        }

        @media (max-width: 780px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .status-draft {
            background: rgba(255, 184, 77, 0.10);
            border-color: rgba(255, 184, 77, 0.28);
            color: #ffd28a;
        }

        .status-submitted {
            background: rgba(103, 168, 255, 0.10);
            border-color: rgba(103, 168, 255, 0.28);
            color: #cfe3ff;
        }

        .status-reviewed {
            background: rgba(168, 120, 255, 0.10);
            border-color: rgba(168, 120, 255, 0.28);
            color: #e3d4ff;
        }

        .status-completed {
            background: rgba(71, 209, 140, 0.10);
            border-color: rgba(71, 209, 140, 0.28);
            color: #c9f5df;
        }

        .msg {
            margin-top: 12px;
            color: #9cabbd;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h1>trade admin queue</h1>
            <div class="row">
                <input id="adminKey" type="password" placeholder="Admin key" style="min-width:320px;">
                <select id="statusFilter">
                    <option value="submitted">submitted</option>
                    <option value="reviewed">reviewed</option>
                    <option value="">all</option>
                </select>
                <button id="loadBtn" type="button">Load queue</button>
            </div>
            <div class="msg" id="msg">Ready.</div>
        </div>

        <div class="card" id="pricingControls">
            <h2>Pricing controls</h2>
            <p>Adjust live pricing inputs without editing code.</p>

            <div class="form-grid">
                <label>
                    <span>Reference ounce basis (USD)</span>
                    <input id="settingsOzUsdReference" type="number" step="0.0001" min="0" />
                </label>

                <label>
                    <span>Digital exit fee rate</span>
                    <input id="settingsDigitalExitFeeRate" type="number" step="0.0001" min="0" />
                </label>

                <label>
                    <span>Physical redemption fee rate</span>
                    <input id="settingsPhysicalRedemptionFeeRate" type="number" step="0.0001" min="0" />
                </label>

                <label>
                    <span>CIGO reference (USD)</span>
                    <input id="settingsCigoUsdReference" type="number" step="0.0001" min="0" />
                </label>

                <label>
                    <span>CIGO inbound discount rate</span>
                    <input id="settingsCigoInboundHaircutRate" type="number" step="0.0001" min="0" />
                </label>

                <label>
                    <span>CIGO outbound premium rate</span>
                    <input id="settingsCigoOutboundPremiumRate" type="number" step="0.0001" min="0" />
                </label>
            </div>

            <div class="row" style="margin-top:12px;">
                <div><strong>Version:</strong> <span id="settingsVersion">-</span></div>
                <div><strong>Updated:</strong> <span id="settingsUpdatedAt">-</span></div>
            </div>

            <div class="row" style="margin-top:14px;">
                <button type="button" id="loadSettingsBtn">Load settings</button>
                <button type="button" id="saveSettingsBtn">Save settings</button>
            </div>
        </div>

        <div id="list"></div>
    </div>

    <script>
        const adminKeyEl = document.getElementById('adminKey');
        const statusFilterEl = document.getElementById('statusFilter');
        const loadBtn = document.getElementById('loadBtn');
        const listEl = document.getElementById('list');
        const msgEl = document.getElementById('msg');

        const settingsOzUsdReferenceEl = document.getElementById('settingsOzUsdReference');
        const settingsDigitalExitFeeRateEl = document.getElementById('settingsDigitalExitFeeRate');
        const settingsPhysicalRedemptionFeeRateEl = document.getElementById('settingsPhysicalRedemptionFeeRate');
        const settingsCigoUsdReferenceEl = document.getElementById('settingsCigoUsdReference');
        const settingsCigoInboundHaircutRateEl = document.getElementById('settingsCigoInboundHaircutRate');
        const settingsCigoOutboundPremiumRateEl = document.getElementById('settingsCigoOutboundPremiumRate');
        const settingsVersionEl = document.getElementById('settingsVersion');
        const settingsUpdatedAtEl = document.getElementById('settingsUpdatedAt');
        const loadSettingsBtn = document.getElementById('loadSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');

        adminKeyEl.value = sessionStorage.getItem('trade.adminKey') || '';

        function setMsg(text) {
            msgEl.textContent = text;
        }

        function getStatusClass(status) {
            if (status === 'submitted') return 'status status-submitted';
            if (status === 'reviewed') return 'status status-reviewed';
            if (status === 'completed') return 'status status-completed';
            if (status === 'draft') return 'status status-draft';
            return 'status';
        }

        function getAdminKey() {
            const key = adminKeyEl.value.trim();
            sessionStorage.setItem('trade.adminKey', key);
            return key;
        }

        async function apiJson(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'x-trade-admin-key': getAdminKey(),
                    ...(options.headers || {}),
                },
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data.error || `Request failed (${response.status})`);
            }

            return data;
        }

        async function loadAdminSettings() {
            const data = await apiJson('/api/admin/settings');
            const settings = data.settings || {};

            if (settingsOzUsdReferenceEl) settingsOzUsdReferenceEl.value = settings.ozUsdReference ?? '';
            if (settingsDigitalExitFeeRateEl) settingsDigitalExitFeeRateEl.value = settings.digitalExitFeeRate ?? '';
            if (settingsPhysicalRedemptionFeeRateEl) settingsPhysicalRedemptionFeeRateEl.value = settings.physicalRedemptionFeeRate ?? '';
            if (settingsCigoUsdReferenceEl) settingsCigoUsdReferenceEl.value = settings.cigoUsdReference ?? '';
            if (settingsCigoInboundHaircutRateEl) settingsCigoInboundHaircutRateEl.value = settings.cigoInboundHaircutRate ?? '';
            if (settingsCigoOutboundPremiumRateEl) settingsCigoOutboundPremiumRateEl.value = settings.cigoOutboundPremiumRate ?? '';

            if (settingsVersionEl) settingsVersionEl.textContent = settings.version ?? '-';
            if (settingsUpdatedAtEl) settingsUpdatedAtEl.textContent = settings.updatedAt || '-';

            return settings;
        }

        async function saveAdminSettings() {
            const payload = {
                ozUsdReference: Number(settingsOzUsdReferenceEl?.value || 0),
                digitalExitFeeRate: Number(settingsDigitalExitFeeRateEl?.value || 0),
                physicalRedemptionFeeRate: Number(settingsPhysicalRedemptionFeeRateEl?.value || 0),
                cigoUsdReference: Number(settingsCigoUsdReferenceEl?.value || 0),
                cigoInboundHaircutRate: Number(settingsCigoInboundHaircutRateEl?.value || 0),
                cigoOutboundPremiumRate: Number(settingsCigoOutboundPremiumRateEl?.value || 0),
            };

            const data = await apiJson('/api/admin/settings', {
                method: 'POST',
                body: JSON.stringify(payload),
            });

            const settings = data.settings || {};

            if (settingsVersionEl) settingsVersionEl.textContent = settings.version ?? '-';
            if (settingsUpdatedAtEl) settingsUpdatedAtEl.textContent = settings.updatedAt || '-';

            return settings;
        }

        function renderRequests(items) {
            listEl.innerHTML = '';

            if (!items.length) {
                listEl.innerHTML = '<div class="card">No matching requests found.</div>';
                return;
            }

            for (const r of items) {
                const div = document.createElement('div');
                div.className = 'item';

                const actions = [];
                if (r.status === 'submitted') {
                    actions.push(`<button type="button" data-id="${r.id}" data-next="reviewed">Mark reviewed</button>`);
                }
                if (r.status === 'reviewed') {
                    actions.push(`<button type="button" data-id="${r.id}" data-next="completed">Mark completed</button>`);
                }

                div.innerHTML = `
          <div class="row" style="justify-content:space-between;">
            <strong>${r.route || `${r.fromAsset} → ${r.toAsset}`}</strong>
            <span class="${getStatusClass(r.status)}">${r.status}</span>
          </div>

          <div class="grid">
            <div class="label">request id</div><div class="mono">${r.id}</div>
            <div class="label">created</div><div class="mono">${r.createdAt || '-'}</div>
            <div class="label">submitted</div><div class="mono">${r.submittedAt || '-'}</div>
            <div class="label">reviewed</div><div class="mono">${r.reviewedAt || '-'}</div>
            <div class="label">completed</div><div class="mono">${r.completedAt || '-'}</div>
            <div class="label">wallet</div><div class="mono">${r.wallet || '-'}</div>
            <div class="label">input</div><div class="mono">${r.inputAmount} ${r.fromAsset}</div>
            <div class="label">output</div><div class="mono">${r.outputAmount} ${r.toAsset}</div>
            <div class="label">basis</div><div class="mono">$${r.basisValue ?? 0}</div>
            <div class="label">fee</div><div class="mono">$${r.feeAmount ?? 0}</div>
          </div>

          <div class="row" style="margin-top:14px;">
            ${actions.join('')}
          </div>
        `;

                listEl.appendChild(div);
            }

            listEl.querySelectorAll('button[data-id]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const next = btn.getAttribute('data-next');

                    try {
                        const payload = {
                            status: next,
                            note: `Admin changed status to ${next}`
                        };

                        if (next === 'reviewed') {
                            const settlementAddress = window.prompt('Settlement address (full 0x address):', '');

                            if (!settlementAddress || !settlementAddress.trim()) {
                                setMsg('Reviewed update cancelled: settlement address is required.');
                                return;
                            }

                            const settlementAmount = window.prompt(
                                'Settlement amount (leave blank to use request input amount):',
                                ''
                            );

                            const settlementNetwork = window.prompt(
                                'Settlement network:',
                                'BNB Smart Chain'
                            );

                            const settlementNote = window.prompt(
                                'Settlement note (optional):',
                                'Send exact amount only'
                            );

                            payload.settlementAddress = settlementAddress.trim();

                            if (settlementAmount && settlementAmount.trim()) {
                                payload.settlementAmount = settlementAmount.trim();
                            }

                            if (settlementNetwork && settlementNetwork.trim()) {
                                payload.settlementNetwork = settlementNetwork.trim();
                            }

                            if (settlementNote && settlementNote.trim()) {
                                payload.settlementNote = settlementNote.trim();
                            }
                        }

                        setMsg(`Updating ${id} to ${next}...`);

                        await apiJson(`/api/requests/${encodeURIComponent(id)}/status`, {
                            method: 'POST',
                            body: JSON.stringify(payload),
                        });

                        await loadQueue();
                        setMsg(`Updated ${id} to ${next}.`);
                    } catch (err) {
                        setMsg(`Update failed: ${err.message}`);
                    }
                });
            });
        }

        async function loadQueue() {
            try {
                const status = statusFilterEl.value;
                const q = status ? `?status=${encodeURIComponent(status)}&limit=200` : '?limit=200';
                setMsg('Loading queue...');
                const data = await apiJson(`/api/requests${q}`);
                renderRequests(data.requests || []);
                setMsg(`Loaded ${data.requests?.length || 0} request(s).`);
            } catch (err) {
                listEl.innerHTML = '';
                setMsg(`Load failed: ${err.message}`);
            }
        }

        loadSettingsBtn?.addEventListener('click', async () => {
            try {
                setMsg('Loading pricing settings...');
                await loadAdminSettings();
                setMsg('Pricing settings loaded.');
            } catch (err) {
                setMsg(`Load settings failed: ${err.message}`);
            }
        });

        saveSettingsBtn?.addEventListener('click', async () => {
            try {
                setMsg('Saving pricing settings...');
                await saveAdminSettings();
                await loadAdminSettings();
                setMsg('Pricing settings saved and reloaded.');
            } catch (err) {
                setMsg(`Save settings failed: ${err.message}`);
            }
        });

        loadBtn.addEventListener('click', loadQueue);
        loadAdminSettings().catch((err) => {
            setMsg(`Initial settings load failed: ${err.message}`);
        });

    </script>
</body>

</html>
